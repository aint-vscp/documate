name: Feature request
description: Propose an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
      placeholder: As a user, I need...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior or API.
      placeholder: We could add...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List alternatives and tradeoffs.
  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Any migration, breaking changes, or rollout notes.
